# ============================================================
# Configuración SMTP para envío de facturas Salsiao
# ============================================================
# Para habilitar el envío automático de facturas por correo:
#
# 1. Ve a tu cuenta de Google: https://myaccount.google.com/security
# 2. Activa la verificación en 2 pasos si no está activa
# 3. Genera una "Contraseña de aplicación":
#    - https://myaccount.google.com/apppasswords
#    - Selecciona "Correo" y "Otra aplicación (nombre personalizado)"
#    - Copia la contraseña de 16 caracteres que te da Google
# 4. Pega tus datos abajo en mail.smtp.user y mail.smtp.password
#
# NOTA: La contraseña NO es tu contraseña normal de Gmail.
#       Debe ser una "App Password" generada desde Google.
# ============================================================

mail.smtp.host=smtp.gmail.com
mail.smtp.port=587
mail.smtp.user=
mail.smtp.password=
mail.smtp.from=facturas@salsiao.com
mail.smtp.starttls=true
